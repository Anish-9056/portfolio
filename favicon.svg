<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background Circle -->
  <rect width="64" height="64" rx="14" fill="#1a1a2e" />

  <!-- Left Bracket < -->
  <text x="6" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="400" fill="#ff6f00"
    opacity="0.8">&lt;</text>

  <!-- AK Text -->
  <text x="17" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="800"
    fill="#ffffff" letter-spacing="1">AK</text>

  <!-- Slash and Right Bracket /> -->
  <text x="42" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="400"
    fill="#ff6f00" opacity="0.8">/&gt;</text>
</svg>