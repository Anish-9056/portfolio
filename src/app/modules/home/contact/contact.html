<section class="section contact-section" id="contact">
  <div class="container">

    <!-- Decorative Background -->
    <div class="contact-bg-elements">
      <div class="bg-ring bg-ring--1"></div>
      <div class="bg-ring bg-ring--2"></div>
      <div class="bg-glow"></div>
    </div>

    <div class="contact-wrapper animate-on-scroll">

      <!-- Header -->
      <div class="section-header">
        <span class="section-tag">
          <mat-icon class="tag-icon">mail</mat-icon>
          Contact
        </span>
        <h2 class="section-title">Get In Touch</h2>
        <p class="section-description">
          I'm currently open to new opportunities. Whether you have a question,
          a project idea, or just want to say hi — my inbox is always open.
          I'll get back to you as soon as possible!
        </p>
      </div>


      <!-- CTA Button -->
      <div class="cta-wrapper">
        <a href="mailto:your.email&#64;example.com" class="cta-button">
          <mat-icon class="cta-icon">send</mat-icon>
          Say Hello
        </a>
        <p class="cta-subtext">
          <mat-icon class="subtext-icon">schedule</mat-icon>
          Usually responds within 24 hours
        </p>
      </div>

    </div>
  </div>
</section>
